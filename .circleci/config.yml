version: 2.1

executors:
  python:
    docker:
      - image: cimg/python:3.10
        environment:
          POSTGRES_DB: odoo_br_pilot
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
      - image: cimg/postgres:15
        environment:
          POSTGRES_DB: odoo_br_pilot
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo

jobs:
  lint-and-test:
    executor: python
    steps:
      - checkout
      - run:
          name: "Install Python dependencies"
          command: |
            pip install --upgrade pip
            pip install flake8 black pylint

      - run:
          name: "Run linting on custom modules"
          command: |
            flake8 odoo-addons/ --count --select=E9,F63,F7,F82 --show-source --statistics
            flake8 odoo-addons/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - run:
          name: "Check Python formatting"
          command: |
            black --check odoo-addons/ || true

  build-docker:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true

      - run:
          name: "Build Docker image"
          command: |
            docker build -t botonrojo:${CIRCLE_SHA1:0:7} .
            docker tag botonrojo:${CIRCLE_SHA1:0:7} botonrojo:latest

      - run:
          name: "Save Docker image"
          command: |
            mkdir -p /tmp/docker
            docker save botonrojo:${CIRCLE_SHA1:0:7} | gzip > /tmp/docker/botonrojo-image.tar.gz

      - persist_to_workspace:
          root: /tmp/docker
          paths:
            - botonrojo-image.tar.gz

  deploy-sandbox:
    docker:
      - image: cimg/base:current
    environment:
      DEPLOYMENT_ENV: sandbox
    steps:
      - checkout
      - attach_workspace:
          at: /tmp/docker

      - setup_remote_docker:
          docker_layer_caching: true

      - run:
          name: "Load Docker image"
          command: |
            docker load --input /tmp/docker/botonrojo-image.tar.gz

      - run:
          name: "Setup deployment credentials"
          command: |
            mkdir -p ~/.ssh
            echo "$SSH_PRIVATE_KEY_SANDBOX" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
            ssh-keyscan -H "$SANDBOX_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - run:
          name: "Deploy to Sandbox"
          command: |
            ssh -o StrictHostKeyChecking=no deploy@${SANDBOX_HOST} \<< 'EOF'
            cd /opt/botonrojo
            docker pull botonrojo:latest
            docker-compose down || true
            docker-compose up -d
            docker-compose exec -T odoo odoo --update=all --stop-after-init
            EOF

      - run:
          name: "Verify deployment"
          command: |
            sleep 10
            curl -f http://${SANDBOX_HOST}:8069/web/health || exit 1

workflows:
  version: 2

  test-and-deploy:
    jobs:
      - lint-and-test:
          filters:
            branches:
              only: /.*/

      - build-docker:
          requires:
            - lint-and-test
          filters:
            branches:
              only:
                - main
                - develop

      - deploy-sandbox:
          requires:
            - build-docker
          filters:
            branches:
              only: main
          context:
            - botonrojo-deploy-sandbox
