version: '3.8'

services:
  db:
    image: postgres:15
    container_name: botonrojo-db
    environment:
      POSTGRES_DB: ${DB_NAME:-odoo_br_pilot}
      POSTGRES_USER: ${DB_USER:-odoo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-odoo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: botonrojo-odoo
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: ${DB_HOST:-db}
      PORT: 5432
      USER: ${DB_USER:-odoo}
      PASSWORD: ${DB_PASSWORD:-odoo}
      DBUSERPASSWORD: ${DB_PASSWORD:-odoo}
      DB_FILTER: ${DB_FILTER:-.*}
      PGUSER: ${DB_USER:-odoo}
      ADDONS_PATH: /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
    volumes:
      - ./addons:/mnt/extra-addons
      - odoo_data:/var/lib/odoo
    ports:
      - "${ODOO_PORT:-8069}:8069"
    command: odoo -d ${DB_NAME:-odoo_br_pilot}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  odoo_data:
